<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Products</title>
  <style>
    body{font-family:Arial,Helvetica,sans-serif;margin:20px;background:#f5f5f5}
    .grid{display:flex;flex-wrap:wrap;gap:16px}
    .card{background:#fff;padding:12px;border-radius:8px;box-shadow:0 2px 6px rgba(0,0,0,.08);width:220px}
    .card img{width:100%;height:140px;object-fit:cover;border-radius:6px}
    .name{font-weight:600;margin-top:8px}
    .price{color:#007bff;font-weight:700}
  </style>
</head>
<body>
  <h1>Products</h1>
  <div id="list" class="grid"></div>

  <script>
    async function load() {
      try {
        const res = await fetch('http://localhost:3000/api/products');
        const data = await res.json();
        const list = document.getElementById('list');
        list.innerHTML = '';
        data.forEach(p => {
          const c = document.createElement('div');
          c.className = 'card';
          if (p.image) {
            const img = document.createElement('img');
            // images are served from backend at http://localhost:3000
            img.src = 'http://localhost:3000' + p.image;
            c.appendChild(img);
          }
          const name = document.createElement('div'); name.className = 'name'; name.textContent = p.name; c.appendChild(name);
          const price = document.createElement('div'); price.className = 'price'; price.textContent = p.price + ' ₽'; c.appendChild(price);
          list.appendChild(c);
        });
      } catch (err) {
        console.error(err);
        document.getElementById('list').textContent = 'Ошибка загрузки данных';
      }
    }
    load();
  </script>
</body>
</html>
